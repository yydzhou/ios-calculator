name: Calculator
options:
  bundleIdPrefix: com.dengzhou
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: 5.9
    DEVELOPMENT_TEAM: ""

targets:
  Calculator:
    type: application
    platform: iOS
    sources:
      - path: Calculator/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dengzhou.calculator
        INFOPLIST_FILE: Calculator/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    resources:
      - Calculator/Assets.xcassets

  CalculatorTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CalculatorTests
    dependencies:
      - target: Calculator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dengzhou.calculatortests
